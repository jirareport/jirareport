jira:
  url: https://jira.url/jira

holiday:
  url: https://calendario.com.br
  default-state: SP
  default-city: ARARAQUARA
  token: seuToken
  decode-key: "AFDsa%1!!2341R%#!$$"
  included-type-codes: 1,2,3

security:
  key: super-secret-key

spring:
  application:
    name: jirareport
  datasource:
    url: jdbc:postgresql://localhost:5432/jirareport
    username: ${USER}
    password: 123123
  jpa:
    show-sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    out-of-order: true
    ignore-missing-migrations: true
server:
  error:
    include-message: always
